    <style>
        .cv-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
        }
        .cv-header div { }
        .cv-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            background: var(--accent);
            color: #fff;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .cv-download:hover {
            background: var(--accent-light);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(138, 141, 98, 0.25);
        }
        .cv-download svg { width: 16px; height: 16px; }
        .cv-preview {
            width: 100%;
            height: 80vh;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg-card);
        }
        .cv-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        @media (max-width: 640px) {
            .cv-preview { height: 60vh; }
            .cv-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
